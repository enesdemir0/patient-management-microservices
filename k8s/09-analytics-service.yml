---
# ── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: healthcare
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 4002
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 4002
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3

---
# ── Service (ClusterIP — analytics is internal-only) ────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: healthcare
spec:
  selector:
    app: analytics-service
  ports:
    - port: 4002
      targetPort: 4002
