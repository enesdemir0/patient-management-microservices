services:
  # --- 1. PATIENT DATABASE ---
  patient-service-db:
    image: postgres:15-alpine
    container_name: patient-service-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - medical-network

  # --- 2. AUTH DATABASE (The one you asked for) ---
  auth-service-db:
    image: postgres:15-alpine
    container_name: auth-service-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    networks:
      - medical-network

  # --- 3. KAFKA BROKER ---
  kafka:
    image: apache/kafka:latest
    container_name: kafka-broker
    restart: on-failure 
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - medical-network

  # --- 4. AUTH SERVICE (New) ---
  auth-service:
    build: ./auth-service
    container_name: auth-service-app

    environment:
      # These match your teacher's variables exactly
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-service-db:5432/${AUTH_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-service-db
    networks:
      - medical-network

  # --- 5. PATIENT SERVICE ---
  patient-service:
    build: ./patient-service
    container_name: patient-service-app
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-service-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BILLING_SERVICE_HOST: billing-service-app
      BILLING_SERVICE_PORT: 9001
    depends_on:
      - patient-service-db
      - kafka
    networks:
      - medical-network

  # --- 6. BILLING SERVICE ---
  billing-service:
    build: ./billing-service
    container_name: billing-service-app
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - medical-network

  # --- 7. ANALYTICS SERVICE ---
  analytics-service:
    build: ./analytics-service
    container_name: analytics-service-app
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - medical-network

  # --- 8. API GATEWAY ---
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway-app
    ports:
      - "4004:4004"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:4005
      - PATIENT_SERVICE_URL=http://patient-service:4000
    depends_on:
      - patient-service
      - auth-service
    networks:
      - medical-network

networks:
  medical-network:
    driver: bridge