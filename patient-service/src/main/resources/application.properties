spring.application.name=patient-service
server.port=4000

# Try to find Docker env variables. If they don't exist, use H2 fallbacks.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:patientdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin_viewer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA Settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# Show SQL only in dev
spring.jpa.show-sql=true

# H2 Console (Only works when using H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# gRPC Client Configuration
# Use the environment variables from Docker, or fallback to localhost for VS Code
grpc.client.billing-service.address=static://${BILLING_SERVICE_HOST:localhost}:${BILLING_SERVICE_PORT:9001}
grpc.client.billing-service.negotiation-type=plaintext

# Logging
logging.level.root=INFO
logging.level.com.pm=DEBUG

# --- KAFKA CONFIGURATION ---
# 1. The Address (This matches your Docker Compose environment variable)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer = org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer = org.apache.kafka.common.serialization.ByteArraySerializer

# Give the app more time to connect to Kafka before crashing
spring.kafka.admin.fail-fast=false
spring.kafka.producer.retries=3

# Ensure Hibernate doesn't crash if the DB is still warming up
spring.datasource.hikari.initialization-fail-timeout=0
