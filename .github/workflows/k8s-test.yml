name: Kubernetes Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  k8s-integration-test:
    name: Build → Deploy → Test on kind
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          version: v0.25.0
          cluster_name: healthcare-cluster

      - name: Build images
        run: |
          docker build -t auth-service:latest ./auth-service
          docker build -t patient-service:latest ./patient-service
          docker build -t billing-service:latest ./billing-service
          docker build -t analytics-service:latest ./analytics-service
          docker build -t api-gateway:latest ./api-gateway
          docker build -t patient-ui:latest ./patient-ui

      - name: Load images into kind cluster
        run: |
          kind load docker-image auth-service:latest      --name healthcare-cluster
          kind load docker-image patient-service:latest   --name healthcare-cluster
          kind load docker-image billing-service:latest   --name healthcare-cluster
          kind load docker-image analytics-service:latest --name healthcare-cluster
          kind load docker-image api-gateway:latest       --name healthcare-cluster
          kind load docker-image patient-ui:latest        --name healthcare-cluster

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/00-namespace.yml
          kubectl apply -f k8s/01-configmap.yml
          kubectl apply -f k8s/02-secrets.yml
          kubectl apply -f k8s/03-postgres-patient.yml
          kubectl apply -f k8s/04-postgres-auth.yml
          kubectl apply -f k8s/05-kafka.yml
          kubectl apply -f k8s/06-auth-service.yml
          kubectl apply -f k8s/07-patient-service.yml
          kubectl apply -f k8s/08-billing-service.yml
          kubectl apply -f k8s/09-analytics-service.yml
          kubectl apply -f k8s/10-api-gateway.yml
          kubectl apply -f k8s/11-patient-ui.yml

      - name: Wait for infrastructure pods
        run: |
          kubectl wait deployment/patient-service-db --for=condition=Available --timeout=120s -n healthcare
          kubectl wait deployment/auth-service-db --for=condition=Available --timeout=120s -n healthcare
          # Kafka için bekleme süresi 15 dakikaya çıkarıldı
          kubectl wait deployment/kafka --for=condition=Available --timeout=900s -n healthcare

      - name: Wait for all application pods
        run: |
          kubectl wait pod --all --for=condition=Ready --timeout=300s -n healthcare

      - name: Show pod and service status
        run: |
          kubectl get pods    -n healthcare -o wide
          kubectl get services -n healthcare

      - name: Port-forward API Gateway
        run: |
          kubectl port-forward svc/api-gateway 4004:4004 -n healthcare &
          sleep 20

      - name: Run integration tests
        run: |
          cd integration-tests
          chmod +x mvnw
          ./mvnw clean test -e -Dgateway.url=http://localhost:4004

      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== K8s Events ==="
          kubectl get events -n healthcare
          echo "=== Pod Status ==="
          kubectl get pods -n healthcare -o wide
          for pod in $(kubectl get pods -n healthcare -o name); do
            echo "=== Logs for $pod ==="
            kubectl logs $pod -n healthcare --tail=100 || true
          done